# lol-highlighter AWS Infrastructure Configuration (v1.2)
# Updated based on Academy Naming Convention: {user_id}-{project}-{env}-{region_abbr}-{service}-{tier}-{data}

global:
  user_id: &user_id de-ai-05
  project: &project lol
  env: &env dev
  region: &region ap-northeast-2
  region_abbr: &an2 an2

resources:
  ingestion_streaming:
    kinesis_data_streams:
      # --- Bronze Layer
      chat_brz: "de-ai-05-lol-dev-an2-kds-brz-chat"
      game_brz: "de-ai-05-lol-dev-an2-kds-brz-game"
      # --- Gold Layer
      chat_gld: "de-ai-05-lol-dev-an2-kds-gld-chat"
      score_gld: "de-ai-05-lol-dev-an2-kds-gld-score"
      


    kinesis_data_firehose: # Dynamic Partitioning
      # --- 💬 채팅 데이터 (Dynamic Partitioning 적용)
      chat_brz_to_s3: "de-ai-05-lol-dev-an2-kdf-brz-chat"
      # Prefix: bronze/chat/year=!{timestamp:YYYY}/month=!{timestamp:MM}/day=!{timestamp:dd}/
      # Error : bronze/errors/chat/!{firehose:error-output-type}/year=!{timestamp:YYYY}/month=!{timestamp:MM}/day=!{timestamp:dd}/
      # Buffer hints (버퍼 힌트) : 크기 1MB, 간격 60초

      # --- 🎮 게임 데이터 (Dynamic Partitioning 적용)
      game_brz_to_s3: "de-ai-05-lol-dev-an2-kdf-brz-game"
      # Prefix: bronze/game/match_id=!{partitionKeyFromQuery:match_id}/year=!{timestamp:YYYY}/month=!{timestamp:MM}/day=!{timestamp:dd}/
      # Error : bronze/errors/game/!{firehose:error-output-type}/year=!{timestamp:YYYY}/month=!{timestamp:MM}/day=!{timestamp:dd}/
      # Buffer hints (버퍼 힌트) : 크기 1MB, 간격 60초

      # Dynamic Partitioning: Enabled로 체크!
      # Multi-record de-aggregation: Disabled (우리 봇은 1개씩 쏘니까 상관없어).
      # New partition key:
      # Key 이름: match_id
      # JQ query: .match_id (우리 봇이 보내는 JSON 안에 match_id 필드가 있으니까!)
      # S3 bucket prefix: 위에서 우리가 정한 match_id=...가 포함된 경로를 그대로 입력!

  processing:
    # Managed Flink (Kinesis Data Analytics)
    flink_app: "de-ai-05-lol-dev-an2-flink-analyzer"
    studio_notebook: "de-ai-05-lol-dev-an2-stdo-analyzer"
    glue_db: "de_ai_05_lol_dev_an2_glue_db" # DB명은 하이픈(-) 대신 언더바(_) 권장
    athena_db: "de_ai_05_lol_dev_an2_glue_db"
    # 🌟 Glue Job (우리가 이름 바꾼 그 녀석!)
    glue_job_refiner: "de-ai-05-lol-dev-an2-glue-slv-refiner"
    # TYPE          : Spark
    # Language      : python 3
    # glue version  : 가장 높은거
    # Worker type   : G.1X
    # Requested     : 2
    # Job timeout   : 15 (min)
    # retries       : 0


    # 🚀 [New] 통합 배달부 람다 추가
    os_loader_lambda: "de-ai-05-lol-dev-an2-lmd-gld-os-loader"
    # 트리거 연결

  storage_serving:
    # Data Lake (S3)
    s3_bucket: "de-ai-05-lol-an2-s3-datalake"
    # Search & Visualization (OpenSearch) - 정제된 채팅 검색용
    opensearch: "de-ai-05-lol-dev-an2-os-srsh" # 28자 제한
    # id : de-ai-05-master
    # pw : Asdfqwer1234!
    # 정책 가져오기(json)
    # {
    #   "Version": "2012-10-17",
    #   "Statement": [
    #     {
    #       "Effect": "Allow",
    #       "Principal": {
    #         "AWS": "*"
    #       },
    #       "Action": "es:*",
    #       "Resource": "arn:aws:es:ap-northeast-2:827913617635:domain/de-ai-05-lol-dev-an2-os-srsh/*"
    #     }
    #   ]
    # }
    # opensearch dashboard에 접속하고 security -> roles
    
  analytics:
    # SQL based analysis on S3
    athena_workgroup: "de-ai-05-lol-dev-an2-athena-wg"
# 🎯 [핵심] 현재 어떤 경기를 시뮬레이션할지 여기서만 선택!
app_context:
  active_match_key: "worlds_2024_final" # 아래 'matches'에 등록된 키값
  active_set: "g4"                      # g4 또는 g5

# 📚 경기 저장소: 새로운 경기가 추가될 때마다 여기에 계속 덧붙이면 돼!
matches:
  worlds_2024_final:
    metadata:
      tournament: "worlds_2024"
      match_date: "20241102"
      teams: "t1_blg"
    data:
      local_path: "./data"
      chat_source: "t1_blg_chat.jsonl"  # 채팅은 통파일
      game_sets:
          g4:
            file_name: "t1_blg_g4_exact.json"
            wait_seconds: 55
          g5:
            file_name: "t1_blg_g5_exact.json"
            wait_seconds: 3182