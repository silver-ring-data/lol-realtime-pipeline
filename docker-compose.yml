#version: '3.8'
x-airflow-common: &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:2.10.0}
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-pytchat requests}
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  # Airflow 메타데이터 저장용 (이건 Airflow 구동에 필수라 남겨둬야 해!)
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    container_name: lol-airflow-webserver

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    container_name: lol-airflow-scheduler

  # 우리 데이터의 입구! API 서버
  api-server:
    build:
      context: ./data_source/api_server
    ports:
      - "8000:8000"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    container_name: lol-api-server
    #healthcheck: # 서버 상태 체크 기능 추가!
    #  test: ["CMD", "curl", "-f", "http://localhost:8000/"]
    #  interval: 10s
    #  retries: 5
    volumes:
      - ./data_source/api_server:/app
    # 💡 uvicorn의 --reload 옵션을 켜두면, 코드가 바뀔 때마다 서버가 스스로 껐다 켜져!
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

# 1번 손님: 채팅 데이터를 쏴주는 봇
  chat-producer:
    build:
      context: ./data_source/producer/chat  # 채팅 봇 전용 폴더
    depends_on:
      - api-server
    environment:
      - API_URL=http://api-server:8000/source/chat
    container_name: lol-chat-producer
    volumes:
      - ./data_source/producer/chat:/app

  # 2번 손님: 인게임 지표를 쏴주는 봇
  game-producer:
    build:
      context: ./data_source/producer/game  # 게임 봇 전용 폴더
    depends_on:
      - api-server
    environment:
      - API_URL=http://api-server:8000/source/game
    container_name: lol-game-producer
    volumes:
      - ./data_source/producer/game:/app

  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}